<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>H-47 // TRACE NODE</title>
<style>
body{
margin:0;
background:#000;
color:#d0d0d0;
font-family:monospace;
overflow:hidden;
}
.screen{
display:none;
padding:20px;
}
.active{
display:block;
}
.glitch{
animation:gl 1.8s infinite;
}
@keyframes gl{
0%{transform:translate(0)}
20%{transform:translate(-1px,1px)}
40%{transform:translate(1px,-1px)}
60%{transform:translate(0)}
100%{transform:translate(0)}
}
.flash{
animation:flash 5s infinite;
}
@keyframes flash{
0%{background:#000}
50%{background:#050505}
100%{background:#000}
}
input,button{
background:#111;
color:#fff;
border:1px solid #333;
padding:10px;
margin-top:10px;
}
#console{
position:fixed;
bottom:0;
left:0;
width:100%;
height:35%;
background:#000;
color:#0f0;
display:none;
padding:10px;
overflow:auto;
font-size:12px;
}
</style>
</head>
<body class="flash">

<div id="console"></div>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2 class="glitch">BILLY FOUNDATION ACCESS NODE</h2>
<p>ENTER KEY</p>
<input id="pw" placeholder="ACCESS KEY" />
<button onclick="login()">AUTHENTICATE</button>
</div>

<!-- SCAN -->
<div id="scan" class="screen">
<h2 class="glitch">BFRD TRACE SCAN</h2>
<div id="scanlog"></div>
</div>

<!-- TRACE -->
<div id="trace" class="screen">
<h2 class="glitch">RESIDUAL SIGNAL FOUND</h2>
<div id="tracelog"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="screen">
<h2 class="glitch">UNAUTHORIZED PRESENCE DETECTED</h2>
<div id="contactlog"></div>
</div>

<!-- ENDING -->
<div id="ending" class="screen">
<h2 id="title"></h2>
<p id="text"></p>
</div>

<script>

// ---------------- MEMORY ----------------
let mem = JSON.parse(localStorage.getItem("H47")) || {visits:0,infection:0};
mem.visits++;
localStorage.setItem("H47",JSON.stringify(mem));

let start = Date.now();
let state = "login";

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
state=id;
}

// ---------------- LOGIN ----------------
function login(){
let pw=document.getElementById("pw").value;
if(pw==="H47-ACCESS"){
mem.infection+=5;
localStorage.setItem("H47",JSON.stringify(mem));
show("scan");
startScan();
}else{
flash();
}
}

function flash(){
document.body.style.filter="blur(1px)";
setTimeout(()=>document.body.style.filter="",200);
}

// ---------------- SCAN ----------------
let scanLines=[
"initializing scan...",
"scanning network residue...",
"checking anomalies...",
"H-47 not found",
"false positives"
];

function startScan(){
let log=document.getElementById("scanlog");
let i=0;

let t=setInterval(()=>{
if(state!=="scan") return clearInterval(t);

if(i<scanLines.length){
log.innerHTML+=scanLines[i]+"<br>";
}else{
log.innerHTML+="instability detected<br>";
}

i++;

if(i===scanLines.length+3){
clearInterval(t);
show("trace");
startTrace();
}

},800);
}

// ---------------- TRACE ----------------
let ti=0;
function startTrace(){
let out=document.getElementById("tracelog");
let msgs=[
"signal unstable",
"behavioral residue detected",
"you are not alone here",
"system mismatch :)"
];

let t=setInterval(()=>{
if(state!=="trace") return clearInterval(t);

if(ti<msgs.length){
out.innerHTML+=msgs[ti]+"<br>";
ti++;
}else{
out.innerHTML+="it noticed you first<br>";
}

if(ti===msgs.length+2){
clearInterval(t);
show("contact");
startContact();
}

},900);
}

// ---------------- CONTACT ----------------
let ci=0;
function startContact(){
let out=document.getElementById("contactlog");
let msgs=[
"you keep scanning",
"that is incorrect behavior",
"i was already here",
"why are you still looking"
];

let t=setInterval(()=>{
if(state!=="contact") return clearInterval(t);

if(ci<msgs.length){
out.innerHTML+=msgs[ci]+"<br>";
ci++;
}else{
end();
}

},900);
}

// ---------------- ENDINGS ----------------
function end(){
let time=Date.now()-start;
let t="";
let x="";

if(time<10000){
t="FAST NODE";
x="H-47 classifies you as observer.";
mem.infection+=25;
}else if(time>20000){
t="SLOW NODE";
x="residue fully integrated.";
mem.infection+=40;
}else{
t="UNSTABLE NODE";
x="partial awareness achieved.";
mem.infection+=30;
}

localStorage.setItem("H47",JSON.stringify(mem));
show("ending");
document.getElementById("title").innerText=t;
document.getElementById("text").innerText=x;
}

// ---------------- CONSOLE ----------------
let open=false;
let cmd="";

window.addEventListener("keydown",e=>{
if(e.key=="`"){
open=!open;
document.getElementById("console").style.display=open?"block":"none";
}
if(open){
if(e.key=="Enter"){run(cmd);cmd="";}
else cmd+=e.key;
}
});

function run(c){
let con=document.getElementById("console");
con.innerHTML+="<br>> "+c;
if(c=="help")con.innerHTML+="<br>status / echo / purge";
if(c=="status")con.innerHTML+="<br>infection:"+mem.infection+" visits:"+mem.visits;
if(c.startsWith("echo"))con.innerHTML+="<br>"+c.slice(5);
if(c=="purge")con.innerHTML+="<br>denied.";
}

</script>

</body>
</html>
